      const { useState, useEffect } = React;

      // IndexedDB 数据库操作
      const DB_NAME = 'medicalRecordDB';
      const DB_VERSION = 1;

      // 初始化数据库
      const initDB = () => {
        return new Promise((resolve, reject) => {
          // 检查是否在本地文件模式下
          if (window.location.protocol === 'file:') {
            console.log('本地文件模式，使用内存存储');
            reject('本地文件模式');
            return;
          }
          
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          
          request.onerror = () => {
            console.error('数据库连接失败');
            reject('数据库连接失败');
          };
          
          request.onsuccess = () => {
            console.log('数据库连接成功');
            resolve(request.result);
          };
          
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            
            // 创建患者表
            if (!db.objectStoreNames.contains('patients')) {
              const patientStore = db.createObjectStore('patients', { keyPath: 'id', autoIncrement: true });
              patientStore.createIndex('name', 'name', { unique: false });
              patientStore.createIndex('phone', 'phone', { unique: false });
            }
            
            // 创建病历表
            if (!db.objectStoreNames.contains('records')) {
              const recordStore = db.createObjectStore('records', { keyPath: 'id', autoIncrement: true });
              recordStore.createIndex('patientId', 'patientId', { unique: false });
              recordStore.createIndex('date', 'date', { unique: false });
            }
          };
        });
      };

      // 患者数据操作
      const patientDB = {
        // 获取所有患者
        getAll: async () => {
          try {
            const db = await initDB();
            return new Promise((resolve, reject) => {
              const transaction = db.transaction('patients', 'readonly');
              const store = transaction.objectStore('patients');
              const request = store.getAll();
              
              request.onsuccess = () => resolve(request.result);
              request.onerror = () => reject('获取患者列表失败');
            });
          } catch (error) {
            console.log('使用默认患者数据');
            return defaultPatients;
          }
        },

        // 根据ID获取患者
        getById: async (id) => {
          try {
            const db = await initDB();
            return new Promise((resolve, reject) => {
              const transaction = db.transaction('patients', 'readonly');
              const store = transaction.objectStore('patients');
              const request = store.get(id);
              
              request.onsuccess = () => resolve(request.result);
              request.onerror = () => reject('获取患者失败');
            });
          } catch (error) {
            console.log('使用默认患者数据');
            return defaultPatients.find(p => p.id == id) || null;
          }
        },

        // 添加患者
        add: async (patient) => {
          try {
            const db = await initDB();
            return new Promise((resolve, reject) => {
              const transaction = db.transaction('patients', 'readwrite');
              const store = transaction.objectStore('patients');
              const request = store.add(patient);
              
              request.onsuccess = () => resolve({ ...patient, id: request.result });
              request.onerror = () => reject('添加患者失败');
            });
          } catch (error) {
            console.log('本地文件模式，无法添加患者');
            return { ...patient, id: Date.now() };
          }
        },

        // 更新患者
        update: async (patient) => {
          try {
            const db = await initDB();
            return new Promise((resolve, reject) => {
              const transaction = db.transaction('patients', 'readwrite');
              const store = transaction.objectStore('patients');
              const request = store.put(patient);
              
              request.onsuccess = () => resolve(patient);
              request.onerror = () => reject('更新患者失败');
            });
          } catch (error) {
            console.log('本地文件模式，无法更新患者');
            return patient;
          }
        }
      };

      // 病历数据操作
      const recordDB = {

            const db = await initDB();

              request.onsuccess = () => resolve(request.result);
              request.onerror = () => reject('获取病历列表失败');

            return defaultRecords;
          }
        },

        // 根据患者ID获取病历
        getByPatientId: async (patientId) => {
          try {
            const db = await initDB();
            return new Promise((resolve, reject) => {
              const transaction = db.transaction('records', 'readonly');
              const store = transaction.objectStore('records');
              const index = store.index('patientId');
              const request = index.getAll(patientId);
              
              request.onsuccess = () => resolve(request.result);
              request.onerror = () => reject('获取病历失败');
            });
          } catch (error) {
            console.log('使用默认病历数据');
            return defaultRecords.filter(r => r.patientId == patientId);
          }

              const transaction = db.transaction('records', 'readonly');

              request.onerror = () => reject('获取病历失败');

              const transaction = db.transaction('records', 'readwrite');

              const request = store.add(record);
              
              request.onsuccess = () => resolve({ ...record, id: request.result });
              request.onerror = () => reject('添加病历失败');
            });

            return { ...record, id: Date.now() };
          }
        }

                      <svg className="w-5 h-5 text-medical-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                      </svg>
                      <span>联系我们</span>
                    </div>
                    <svg className="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                  </button>
                </div>
              </div>

              {/* 退出登录 */}
              <button className="w-full bg-white border border-medical-red text-medical-red font-medium py-4 rounded-2xl shadow-sm flex items-center justify-center gap-2">
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                退出登录
              </button>
              
              {/* 版权信息 */}
              <div className="text-center text-xs text-gray-400 mt-6">
                DIGITALIS HEALTH SYSTEMS © 2024
              </div>
            </div>
          </div>
        );
      };

      // 主应用组件
      const App = () => {
        const [currentPage, setCurrentPage] = useState('login');
        const [pageHistory, setPageHistory] = useState(['login']);

        const navigateTo = (page, params = null) => {
          setPageHistory(prev => [...prev, page]);
          setCurrentPage(page);
        };

        const navigateBack = () => {
          if (pageHistory.length > 1) {
            const newHistory = [...pageHistory];
            newHistory.pop();
            setPageHistory(newHistory);
            setCurrentPage(newHistory[newHistory.length - 1]);
          }
        };

        const handleLogin = () => {
          navigateTo('home');
        };

        const renderPage = () => {
          switch (currentPage) {
            case 'login':
              return <LoginPage onLogin={handleLogin} />;
            case 'home':
              return <HomePage onNavigate={navigateTo} />;
            case 'patients':
              return <PatientListPage onNavigate={navigateTo} onBack={navigateBack} />;
            case 'create-patient':
              return <CreatePatientPage onNavigate={navigateTo} onBack={navigateBack} />;
            case 'patient-detail':
              return <PatientDetailPage onNavigate={navigateTo} onBack={navigateBack} />;
            case 'create-record':
              return <CreateRecordPage onNavigate={navigateTo} onBack={navigateBack} />;
            case 'record-detail':
              return <RecordDetailPage onNavigate={navigateTo} onBack={navigateBack} />;
            case 'settings':
              return <SettingsPage onBack={navigateBack} />;
            default:
              return <HomePage onNavigate={navigateTo} />;
          }
        };

        return (
          <div className="max-w-md mx-auto bg-gray-50 min-h-screen relative shadow-2xl overflow-hidden">
            <StatusBar />
            {renderPage()}
            <TabBar currentPage={currentPage} onNavigate={navigateTo} />
          </div>
        );
      };

      // 渲染应用
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
