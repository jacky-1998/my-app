<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>医记 - 诊所病历助手</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f2f2f7;
        overflow-x: hidden;
      }
      .touch-active:active {
        opacity: 0.7;
        transform: scale(0.98);
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'medical-blue': '#007AFF',
              'medical-red': '#FF3B30',
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;

      // 简化的应用
      function App() {
        const [currentPage, setCurrentPage] = useState('login');

        const handleLogin = () => {
          setCurrentPage('home');
        };

        const renderPage = () => {
          if (currentPage === 'login') {
            return (
              <div className="pt-12 px-6">
                <div className="w-20 h-20 bg-medical-blue rounded-2xl flex items-center justify-center mb-6 shadow-lg">
                  <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                  </svg>
                </div>
                <h1 className="text-3xl font-bold text-gray-900 mb-2">医记</h1>
                <p className="text-gray-500 mb-8">诊所病历数字化助手</p>
                
                <div className="bg-white rounded-2xl p-4 shadow-sm mb-4">
                  <div className="flex items-center border-b border-gray-100 pb-3">
                    <span className="text-gray-500 w-16 text-sm">手机号</span>
                    <input type="tel" placeholder="请输入手机号" className="flex-1 border-none outline-none text-gray-900" maxlength="11" />
                  </div>
                  <div className="flex items-center pt-3">
                    <span className="text-gray-500 w-16 text-sm">验证码</span>
                    <input type="number" placeholder="请输入验证码" className="flex-1 border-none outline-none text-gray-900" />
                    <button className="text-medical-blue text-sm font-medium whitespace-nowrap">获取验证码</button>
                  </div>
                </div>
                
                <button 
                  onClick={handleLogin}
                  className="w-full bg-medical-blue text-white font-semibold py-4 rounded-2xl touch-active shadow-lg shadow-blue-500/30"
                >
                  登录
                </button>
              </div>
            );
          } else if (currentPage === 'home') {
            return (
              <div className="pt-12 pb-24">
                <div className="px-4 py-3 bg-white shadow-sm">
                  <div className="relative">
                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                      </svg>
                    </div>
                    <input 
                      type="text" 
                      placeholder="搜索患者姓名或手机号" 
                      className="w-full bg-gray-100 rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                  </div>
                </div>
                
                <div className="px-4 py-6 grid grid-cols-2 gap-4">
                  <div className="bg-medical-blue text-white p-5 rounded-2xl shadow-lg shadow-blue-500/30 touch-active">
                    <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center mb-3">
                      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                      </svg>
                    </div>
                    <div className="font-bold text-lg">新建病历</div>
                    <div className="text-blue-100 text-sm mt-1">快速记录患者信息</div>
                  </div>
                  <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 touch-active">
                    <div className="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center mb-3 text-gray-600">
                      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                      </svg>
                    </div>
                    <div className="font-bold text-gray-900 text-lg">患者列表</div>
                    <div className="text-gray-500 text-sm mt-1">查看全部患者</div>
                  </div>
                </div>
              </div>
            );
          }
        };

        return (
          <div className="max-w-md mx-auto bg-gray-50 min-h-screen relative shadow-2xl overflow-hidden">
            {/* 状态栏 */}
            <div className="h-11 bg-white flex items-center justify-between px-6 text-sm font-semibold">
              <span>9:41</span>
              <div className="flex gap-1">
                <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
              </div>
            </div>
            {renderPage()}
            
            {/* 底部导航 */}
            {currentPage !== 'login' && (
              <div className="fixed bottom-0 w-full max-w-md px-6 py-3 flex justify-around items-center z-50 backdrop-filter blur(20px) bg-white/90 border-t border-gray-200">
                <button className="flex flex-col items-center gap-1 text-medical-blue">
                  <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                  <span className="text-xs font-medium">首页</span>
                </button>
                <button className="flex flex-col items-center gap-1 text-gray-400">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                  <span className="text-xs font-medium">患者</span>
                </button>
                <button className="flex flex-col items-center gap-1 text-gray-400">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                  <span className="text-xs font-medium">我</span>
                </button>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
  </body>
</html>
